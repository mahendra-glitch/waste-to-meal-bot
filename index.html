<!DOCTYPE html>
<html lang="en">
<head>
    <title>Waste-to-Meal Bot</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        #recipeResult { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        .lazy-box { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <h2>stewards of the Fridge 🥬</h2>
    <p>Enter 3 ingredients you need to use up:</p>
    <input type="text" id="ing1" placeholder="Ingredient 1 (e.g. Spinach)">
    <input type="text" id="ing2" placeholder="Ingredient 2 (e.g. Eggs)">
    <input type="text" id="ing3" placeholder="Ingredient 3 (e.g. Tortilla)">
    
    <div class="lazy-box">
        <input type="checkbox" id="lazyMode" style="width: auto;">
        <label for="lazyMode">Enable "Lazy Mode" (15 mins or less)</label>
    </div>

    <button onclick="generateRecipe()">Get Recipe</button>

    <div id="recipeResult">
        <h3 id="recipeTitle"></h3>
        <p id="recipeContent"></p>
    </div>

    <script>
        async function generateRecipe() {
            const API_KEY = "ENTER_YOUR_KEY_HERE";
            const i1 = document.getElementById('ing1').value;
            const i2 = document.getElementById('ing2').value;
            const i3 = document.getElementById('ing3').value;
            const isLazy = document.getElementById('lazyMode').checked;
            const resultDiv = document.getElementById('recipeResult');

            const prompt = `Act as a chef. Create a recipe using: ${i1}, ${i2}, and ${i3}. 
                            ${isLazy ? "The recipe MUST be 'Lazy Mode': under 15 minutes and simple." : ""}
                            Format: Title followed by instructions.`;

            // Note: In production, use a proxy or backend to keep your API key safe!
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${ENTER_YOUR_KEY_HERE}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;

            document.getElementById('recipeTitle').innerText = "Chef's Suggestion:";
            document.getElementById('recipeContent').innerText = text;
            resultDiv.style.display = "block";
        }
    </script>
</body>
</html>
